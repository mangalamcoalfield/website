name: Supabase keep-alive

# Free-tier Supabase projects pause after 7 days of inactivity. This inserts
# one row into `keepalive` daily so the website's project never idles out.
# Uses the SERVICE-ROLE/secret key from a GitHub Actions secret — never committed.

on:
  schedule:
    - cron: '17 6 * * *'   # daily, 06:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Insert keep-alive row
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SECRET_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SECRET_KEY secret — skipping."
            exit 0
          fi
          curl -sS -X POST "$SUPABASE_URL/rest/v1/keepalive" \
            -H "apikey: $SUPABASE_SECRET_KEY" \
            -H "Authorization: Bearer $SUPABASE_SECRET_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{}' \
            --fail-with-body
          echo "Keep-alive ping sent."
